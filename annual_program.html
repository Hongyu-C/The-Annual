<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ANNUAL — Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; overflow:hidden; font-family:'DM Sans',sans-serif; user-select:none; }
canvas { position:fixed; inset:0; display:block; cursor:none; }

#nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:24px 40px; pointer-events:none;
}
#nav-title { pointer-events:auto; }
#nav-title h1 { font-family:'Syne',sans-serif; font-size:11px; font-weight:400; letter-spacing:.25em; text-transform:uppercase; color:#999; }
#nav-title p  { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:#1a1a1a; margin-top:2px; }
#nav-switch { pointer-events:auto; display:flex; gap:8px; }
.nav-btn { background:rgba(255,255,255,.88); backdrop-filter:blur(8px); border:1px solid rgba(0,0,0,.08); padding:8px 18px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:#666; cursor:pointer; border-radius:100px; transition:all .2s; text-decoration:none; }
.nav-btn:hover,.nav-btn.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

#legend {
  position:fixed; bottom:36px; left:36px; z-index:200;
  background:rgba(255,255,255,.78); backdrop-filter:blur(14px);
  border-radius:16px; padding:16px 20px; border:1px solid rgba(0,0,0,.06);
}
.lr { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:12px; font-weight:500; color:#333; }
.lr:last-child { margin-bottom:0; }
.ld { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.lp { margin-left:auto; padding-left:16px; font-weight:400; color:#888; font-size:11px; }

#hint {
  position:fixed; bottom:36px; right:36px; z-index:200;
  font-size:11px; color:#bbb; letter-spacing:.1em; text-transform:uppercase;
}

/* CARD */
#overlay {
  position:fixed; inset:0; z-index:300;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.45); backdrop-filter:blur(8px);
  opacity:0; pointer-events:none; transition:opacity .2s ease;
}
#overlay.on { opacity:1; pointer-events:auto; }
#card {
  background:#fff; border-radius:28px; padding:40px 44px;
  max-width:420px; width:90vw; position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.14),0 4px 16px rgba(0,0,0,.06);
  transform:scale(.92) translateY(12px);
  transition:transform .28s cubic-bezier(.34,1.4,.64,1);
}
#overlay.on #card { transform:scale(1) translateY(0); }
#cbar { position:absolute; top:0; left:0; right:0; height:6px; border-radius:28px 28px 0 0; }
#cemoji { font-size:52px; display:block; margin-bottom:10px; }
#ccat  { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#bbb; margin-bottom:4px; }
#ctitle{ font-family:'Syne',sans-serif; font-size:32px; font-weight:800; color:#1a1a1a; line-height:1.1; margin-bottom:4px; }
#cpct  { font-family:'Syne',sans-serif; font-size:52px; font-weight:800; line-height:1; margin-bottom:18px; }
#cdesc { font-size:14px; line-height:1.7; color:#555; margin-bottom:22px; }
#cfacts{ display:flex; flex-direction:column; gap:10px; }
.fact  { background:#f8f8f8; border-radius:12px; padding:12px 16px; font-size:13px; color:#333; line-height:1.5; }
.fact strong { display:block; font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:2px; }
#cclose { position:absolute; top:18px; right:18px; width:32px; height:32px; border-radius:50%; background:#f0f0f0; border:none; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#666; transition:background .15s; }
#cclose:hover { background:#e0e0e0; }

/* ── EXPLODE LAYER ── */
#explode-layer {
  position: fixed; inset: 0; z-index: 150;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#explode-layer.on {
  pointer-events: auto;
  opacity: 1;
}

.fact-card {
  position: absolute;
  background: #fff;
  border-radius: 20px;
  padding: 18px 22px;
  cursor: grab;
  box-shadow: 0 8px 40px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
  transform-origin: center center;
  transition: box-shadow 0.2s ease;
  user-select: none;
  overflow: visible;
}
.fact-card:active { cursor: grabbing; }
.fact-card:hover { box-shadow: 0 16px 60px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.09); }

.fact-card .fc-bar {
  height: 4px;
  border-radius: 4px;
  margin-bottom: 12px;
  opacity: 0.85;
}
.fact-card .fc-cat {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.45;
}
.fact-card .fc-num {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  line-height: 1.05;
  margin-bottom: 6px;
  color: #1a1a1a;
}
.fact-card .fc-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.5;
  color: #555;
}

/* floating emoji */
.fact-card .fc-emoji {
  position: absolute;
  top: -22px;
  right: -10px;
  font-size: 2em;
  pointer-events: none;
  animation: floatEmoji 3s ease-in-out infinite;
  animation-delay: var(--edelay, 0s);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes floatEmoji {
  0%, 100% { transform: translateY(0) rotate(var(--erot, -5deg)); }
  50% { transform: translateY(-8px) rotate(var(--erot2, 5deg)); }
}

/* explode button */
#explode-btn {
  position: fixed;
  bottom: 36px; right: 36px;
  z-index: 200;
  background: #1a1a1a;
  color: #fff;
  border: none;
  padding: 14px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 100px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
#explode-btn:hover { transform: scale(1.04); background: #333; }
#explode-btn.on { background: #E8635A; }

/* card entrance animation */
@keyframes cardIn {
  from { opacity: 0; transform: translate(var(--ox), var(--oy)) scale(0.3) rotate(var(--rot)); }
  to   { opacity: 1; transform: translate(0,0) scale(1) rotate(var(--rot)); }
}
.fact-card.animating {
  animation: cardIn 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
}
@keyframes cardOut {
  from { opacity: 1; transform: translate(0,0) scale(1) rotate(var(--rot)); }
  to   { opacity: 0; transform: translate(var(--ox), var(--oy)) scale(0.2) rotate(var(--rot)); }
}
.fact-card.animating-out {
  animation: cardOut 0.35s cubic-bezier(0.4, 0, 1, 1) forwards;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="nav">
  <div id="nav-title"><h1>The Annual</h1><p>Program</p></div>
  <div id="nav-switch">
    <a class="nav-btn active" href="annual_program.html">Program</a>
    <a class="nav-btn" href="annual_blocks.html">Form Language</a>
  </div>
</div>

<div id="legend">
  <div class="lr"><div class="ld" style="background:#E8635A"></div>Watch<span class="lp">23%</span></div>
  <div class="lr"><div class="ld" style="background:#F2C94C"></div>Play<span class="lp">12%</span></div>
  <div class="lr"><div class="ld" style="background:#5BC8C8"></div>Share<span class="lp">5%</span></div>
  <div class="lr"><div class="ld" style="background:#9B8EC4"></div>Learn<span class="lp">11%</span></div>
  <div class="lr"><div class="ld" style="background:#F4A7B9"></div>Gather<span class="lp">11%</span></div>
  <div class="lr"><div class="ld" style="background:#4ecdc4"></div>Hang<span class="lp">30%</span></div>
  <div class="lr"><div class="ld" style="background:#A8D8A8"></div>BOH<span class="lp">8%</span></div>
</div>

<div id="hint" style="bottom:90px;">move mouse to flow · click shape to explore</div>

<div id="overlay">
  <div id="card">
    <div id="cbar"></div>
    <button id="cclose">✕</button>
    <span id="cemoji"></span>
    <div id="ccat"></div>
    <div id="ctitle"></div>
    <div id="cpct"></div>
    <div id="cdesc"></div>
    <div id="cfacts"></div>
  </div>
</div>

<script>
// ── DATA ──
const PROGRAMS = {
  watch: {
    label:'Watch', pct:'23%', color:'#E8635A', emoji:'🍿',
    desc:'Immersive screening rooms where NYC\'s year plays back — viral moments, street footage, and the unseen city.',
    facts:[
      { num:'7,000+', text:'film shoot permits issued annually, making NYC streets the world\'s biggest backlot' },
      { num:'41', text:'official Broadway theaters, but surprisingly only 4 are actually located on Broadway' },
      { num:'275+', text:'bird species spotted in Central Park, a major stopover on the Atlantic Flyway' },
    ]
  },
  play: {
    label:'Play', pct:'12%', color:'#F2C94C', emoji:'🪩',
    desc:'Interactive installations where visitors shape the data — touch and game mechanics reveal the city\'s hidden patterns.',
    facts:[
      { num:'1,700+', text:'public parks and playgrounds spread across the five boroughs' },
      { num:'1927', text:'the year the iconic Cyclone roller coaster opened in Coney Island, and it\'s still running' },
      { num:'500+', text:'outdoor basketball courts in NYC, known globally as the proving grounds of streetball' },
    ]
  },
  share: {
    label:'Share', pct:'5%', color:'#5BC8C8', emoji:'📸',
    desc:'Social posting stations and shareable moments — broadcasting the Annual experience to the rest of the world.',
    facts:[
      { num:'800+', text:'languages spoken in Queens, making it the most linguistically diverse place on Earth' },
      { num:'13,000+', text:'iconic yellow taxis roaming the streets of New York City' },
      { num:'500,000', text:'whole pizza pies consumed by New Yorkers every single day' },
    ]
  },
  learn: {
    label:'Learn', pct:'11%', color:'#9B8EC4', emoji:'🏛️',
    desc:'Archive rooms holding the raw data behind the year — open datasets, maps, census records, and city documents.',
    facts:[
      { num:'55M+', text:'open data records published by the NYC government annually' },
      { num:'50M+', text:'items in the NY Public Library collection, the second largest in the US' },
      { num:'100+', text:'museums spread across the city, from the massive Met to a tiny museum in an elevator shaft' },
    ]
  },
  gather: {
    label:'Gather', pct:'11%', color:'#F4A7B9', emoji:'🍻',
    desc:'Flexible event spaces for talks, performances, and community rituals — the city\'s collective pulse made physical.',
    facts:[
      { num:'2.5M', text:'spectators lining the streets every year for the Thanksgiving Day Parade' },
      { num:'330,000', text:'people passing through Times Square daily, earning it the title "Crossroads of the World"' },
      { num:'26,000+', text:'restaurants in NYC — you could eat at a new one every day for 71 years' },
    ]
  },
  hang: {
    label:'Hang', pct:'30%', color:'#4ecdc4', emoji:'🌭',
    desc:'The largest zone — casual lounges, terraces, and in-between spaces for wandering, resting, and just being in the city.',
    facts:[
      { num:'$289K', text:'the highest annual fee ever paid for a single hot dog cart permit outside the Central Park Zoo' },
      { num:'9,000+', text:'benches in Central Park alone, perfect for resting and people-watching' },
      { num:'520 mi', text:'of NYC coastline, longer than the coastlines of Miami, Boston, LA, and SF combined' },
    ]
  },
  boh: {
    label:'BOH', pct:'8%', color:'#A8D8A8', emoji:'🚇',
    desc:'Back of house — the infrastructure and systems that make the Annual run. The invisible city beneath the city.',
    facts:[
      { num:'472', text:'subway stations running 24 hours a day, 365 days a year' },
      { num:'105 mi', text:'of commercial steam pipes beneath Manhattan, causing those iconic billowing manholes' },
      { num:'12,000', text:'tons of residential trash collected daily by the Department of Sanitation' },
    ]
  },
};

// ── CANVAS SETUP ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ── SHAPE DEFINITIONS ──
const COLORS = {
  watch:'#E8635A', play:'#F2C94C', share:'#5BC8C8',
  learn:'#9B8EC4', gather:'#F4A7B9', hang:'#4ecdc4', boh:'#A8D8A8'
};

// Pool proportional to percentages
const POOL = [
  ...Array(32).fill('watch'), ...Array(18).fill('play'),
  ...Array(7).fill('share'),  ...Array(16).fill('learn'),
  ...Array(16).fill('gather'), ...Array(43).fill('hang'),
  ...Array(10).fill('boh'),
];

function rand(a,b){ return a + Math.random()*(b-a); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

// Shape drawing types
const TYPES = ['pill-h','pill-v','roundrect','roundrect-sq','circle','squircle'];

function makeShape(cat) {
  const type = pick(TYPES);
  let w, h;
  if (type==='pill-h')     { w=rand(240,480); h=rand(75,120); }
  else if(type==='pill-v') { w=rand(75,115);  h=rand(200,340); }
  else if(type==='roundrect')    { w=rand(200,360); h=rand(140,250); }
  else if(type==='roundrect-sq') { w=rand(140,250);  h=rand(140,250); }
  else if(type==='circle')  { w=rand(80,160); h=w; }
  else                      { w=rand(170,290); h=rand(170,290); }

  return {
    cat, type,
    x: rand(-w*0.2, W+w*0.2),
    y: rand(-h*0.2, H+h*0.2),
    w, h,
    rot: rand(-20, 20),
    alpha: rand(0.72, 1.0),
    // physics
    vx: rand(-0.12, 0.12),
    vy: rand(-0.08, 0.08),
    // wobble
    wobbleAmp: rand(0.008, 0.018),
    wobbleSpd: rand(0.008, 0.016),
    wobbleOff: rand(0, Math.PI*2),
    // hover
    hovered: false,
    hoverScale: 1,
    emojiAlpha: 0,
  };
}

const shapes = POOL.map(cat => makeShape(cat));

// ── MOUSE ──
let mx = W/2, my = H/2;
let mvx = 0, mvy = 0;  // mouse velocity
let pmx = W/2, pmy = H/2;

// Custom cursor
let cursorAlpha = 0;

canvas.addEventListener('mousemove', e => {
  mvx = e.clientX - mx;
  mvy = e.clientY - my;
  mx = e.clientX;
  my = e.clientY;
  cursorAlpha = 1;
});
canvas.addEventListener('mouseleave', () => { mvx=0; mvy=0; });

// ── HIT TEST ──
function hitShape(s, px, py) {
  // Transform point into shape's local space
  const dx = px - s.x, dy = py - s.y;
  const r = -s.rot * Math.PI/180;
  const lx =  dx*Math.cos(r) + dy*Math.sin(r);
  const ly = -dx*Math.sin(r) + dy*Math.cos(r);
  const rx = s.w/2, ry = s.h/2;
  return lx >= -rx && lx <= rx && ly >= -ry && ly <= ry;
}

// ── DRAW SHAPE ──
function drawShape(s, t) {
  const scale = s.hoverScale;
  const wobRot = Math.sin(t * s.wobbleSpd + s.wobbleOff) * s.wobbleAmp * 30;
  const totalRot = (s.rot + wobRot) * Math.PI/180;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(totalRot);
  ctx.scale(scale, scale);
  ctx.globalAlpha = s.alpha * (s.hovered ? 1.0 : 0.92);

  const hw = s.w/2, hh = s.h/2;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.13)';
  ctx.shadowBlur  = 18;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 6;

  ctx.fillStyle = COLORS[s.cat];
  ctx.beginPath();

  if (s.type==='circle') {
    ctx.ellipse(0, 0, hw, hh, 0, 0, Math.PI*2);
  } else if (s.type==='pill-h' || s.type==='pill-v') {
    const r = Math.min(hw, hh);
    roundRect(ctx, -hw, -hh, s.w, s.h, r);
  } else if (s.type==='squircle') {
    roundRect(ctx, -hw, -hh, s.w, s.h, Math.min(hw,hh)*0.55);
  } else if (s.type==='roundrect-sq') {
    roundRect(ctx, -hw, -hh, s.w, s.h, 32);
  } else {
    roundRect(ctx, -hw, -hh, s.w, s.h, 24);
  }
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // Emoji on hover
  if (s.emojiAlpha > 0.01) {
    ctx.globalAlpha = s.emojiAlpha;
    ctx.shadowBlur = 0;
    const em = PROGRAMS[s.cat].emoji;
    const fontSize = Math.min(hw, hh) * 1.1;
    ctx.font = `${fontSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.0)'; // clear fill, emoji renders as-is
    ctx.fillText(em, 0, 0);
    // Actually draw emoji properly:
    ctx.globalAlpha = s.emojiAlpha;
    ctx.font = `${Math.min(hw*1.1, hh*1.1, 48)}px serif`;
    ctx.fillStyle = '#000';
    ctx.fillText(em, 0, 2);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── CARD ──
const overlay = document.getElementById('overlay');
document.getElementById('cclose').addEventListener('click', () => overlay.classList.remove('on'));
overlay.addEventListener('click', e => { if(e.target===overlay) overlay.classList.remove('on'); });
document.addEventListener('keydown', e => { if(e.key==='Escape') overlay.classList.remove('on'); });

canvas.addEventListener('click', e => {
  if (overlay.classList.contains('on')) return;
  for (let i = shapes.length-1; i >= 0; i--) {
    if (hitShape(shapes[i], e.clientX, e.clientY)) {
      openCard(shapes[i].cat);
      break;
    }
  }
});

function openCard(cat) {
  const p = PROGRAMS[cat];
  document.getElementById('cbar').style.background = p.color;
  document.getElementById('cemoji').textContent = p.emoji;
  document.getElementById('ccat').textContent = 'Program Type';
  document.getElementById('ctitle').textContent = p.label;
  document.getElementById('cpct').textContent = p.pct;
  document.getElementById('cpct').style.color = p.color;
  document.getElementById('cdesc').textContent = p.desc;
  const factsEl = document.getElementById('cfacts');
  factsEl.innerHTML = '';
  p.facts.forEach(f => {
    const d = document.createElement('div');
    d.className = 'fact';
    d.innerHTML = `<strong>${f.num}</strong>${f.text}`;
    factsEl.appendChild(d);
  });
  overlay.classList.add('on');
}

// ── LOOP ──
let t = 0;
// Current velocity field — mouse movement creates a "flow" that decays
let flowVx = 0, flowVy = 0;

function loop() {
  requestAnimationFrame(loop);
  t++;

  // Decay mouse velocity into flow field
  flowVx += (mvx * 0.025 - flowVx) * 0.09;
  flowVy += (mvy * 0.025 - flowVy) * 0.09;
  mvx *= 0.85; mvy *= 0.85;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Sort by z (alpha as proxy)
  shapes.sort((a,b) => a.alpha - b.alpha);

  for (const s of shapes) {
    // Apply flow field to velocity (gentle push in mouse direction)
    s.vx += flowVx * 0.014;
    s.vy += flowVy * 0.014;

    // Organic base drift (Lissajous-style)
    const driftX = Math.sin(t * s.wobbleSpd * 0.6 + s.wobbleOff) * 0.008;
    const driftY = Math.cos(t * s.wobbleSpd * 0.4 + s.wobbleOff + 1) * 0.006;
    s.vx += driftX;
    s.vy += driftY;

    // Damping — keeps things slow and floaty
    s.vx *= 0.97;
    s.vy *= 0.97;

    // Speed cap
    const spd = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
    if (spd > 2.2) { s.vx *= 2.2/spd; s.vy *= 2.2/spd; }

    s.x += s.vx;
    s.y += s.vy;

    // Wrap around screen edges
    const pad = Math.max(s.w, s.h);
    if (s.x > W + pad) s.x = -pad;
    if (s.x < -pad)    s.x = W + pad;
    if (s.y > H + pad) s.y = -pad;
    if (s.y < -pad)    s.y = H + pad;

    // Hover detection
    const wasHovered = s.hovered;
    s.hovered = hitShape(s, mx, my);
    if (s.hovered) canvas.style.cursor = 'pointer';

    // Smooth hover scale & emoji fade
    const targetScale = s.hovered ? 1.07 : 1.0;
    s.hoverScale += (targetScale - s.hoverScale) * 0.14;
    const targetEmoji = s.hovered ? 1 : 0;
    s.emojiAlpha += (targetEmoji - s.emojiAlpha) * 0.14;

    drawShape(s, t);
  }

  // Reset cursor if nothing hovered
  const anyHovered = shapes.some(s => s.hovered);
  canvas.style.cursor = anyHovered ? 'pointer' : 'none';

  // Draw custom cursor dot
  cursorAlpha *= 0.97;
  if (cursorAlpha > 0.01) {
    ctx.save();
    ctx.globalAlpha = cursorAlpha * 0.5;
    ctx.beginPath();
    ctx.arc(mx, my, 5, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.restore();
  }
}

loop();
</script>

<div id="explode-layer"></div>
<button id="explode-btn">✦ Explode</button>

<script>
// ── ALL FACTS as individual cards ──
const ALL_FACTS = [
  { cat:"Watch", color:"#E8635A", emoji:"🍿", num:"7,000+", text:"film shoot permits issued annually — NYC streets are the world's biggest backlot" },
  { cat:"Watch", color:"#E8635A", emoji:"🎭", num:"41", text:"official Broadway theaters, but only 4 are actually on Broadway" },
  { cat:"Watch", color:"#E8635A", emoji:"🐦", num:"275+", text:"bird species spotted in Central Park — a major stop on the Atlantic Flyway" },
  { cat:"Watch", color:"#E8635A", emoji:"🎬", num:"13,404", text:"Broadway performances in 2024-25 — the most ever in a single season" },
  { cat:"Play", color:"#F2C94C", emoji:"🪩", num:"1,700+", text:"public parks and playgrounds across the five boroughs" },
  { cat:"Play", color:"#F2C94C", emoji:"🎢", num:"1927", text:"the year the Cyclone roller coaster opened in Coney Island — still running today" },
  { cat:"Play", color:"#F2C94C", emoji:"🏀", num:"500+", text:"outdoor basketball courts, known globally as the proving grounds of streetball" },
  { cat:"Play", color:"#F2C94C", emoji:"🎮", num:"800+", text:"languages spoken in Queens — the most linguistically diverse place on Earth" },
  { cat:"Share", color:"#5BC8C8", emoji:"📸", num:"13,000+", text:"iconic yellow taxis roaming the streets of New York City" },
  { cat:"Share", color:"#5BC8C8", emoji:"🍕", num:"500,000", text:"whole pizza pies consumed by New Yorkers every single day" },
  { cat:"Share", color:"#5BC8C8", emoji:"🚇", num:"$2.90", text:"Pizza Principle: a subway ride and a slice have cost the same for 50+ years" },
  { cat:"Learn", color:"#9B8EC4", emoji:"🏛️", num:"55M+", text:"open data records published by NYC government annually" },
  { cat:"Learn", color:"#9B8EC4", emoji:"📚", num:"50M+", text:"items in the NY Public Library — second largest collection in the US" },
  { cat:"Learn", color:"#9B8EC4", emoji:"🌳", num:"689,000+", text:"street trees registered in NYC — the London Planetree leads the count" },
  { cat:"Learn", color:"#9B8EC4", emoji:"🏫", num:"100+", text:"museums across the city, from the massive Met to one inside an elevator shaft" },
  { cat:"Gather", color:"#F4A7B9", emoji:"🍻", num:"2.5M", text:"spectators lining the streets for the Thanksgiving Day Parade every year" },
  { cat:"Gather", color:"#F4A7B9", emoji:"🎉", num:"330,000", text:"people passing through Times Square daily — the Crossroads of the World" },
  { cat:"Gather", color:"#F4A7B9", emoji:"🍽️", num:"26,000+", text:"restaurants in NYC — eat at a new one every day for 71 years" },
  { cat:"Gather", color:"#F4A7B9", emoji:"🎪", num:"14,660,000", text:"Broadway audience members last season — nearly $1.9B in ticket sales" },
  { cat:"Hang", color:"#4ecdc4", emoji:"🌭", num:"$289K", text:"highest annual fee ever paid for a single hot dog cart permit in Central Park" },
  { cat:"Hang", color:"#4ecdc4", emoji:"🛋️", num:"9,000+", text:"benches in Central Park alone — perfect for resting and people-watching" },
  { cat:"Hang", color:"#4ecdc4", emoji:"🌊", num:"520 mi", text:"of NYC coastline — longer than Miami, Boston, LA, and SF combined" },
  { cat:"Hang", color:"#4ecdc4", emoji:"☕", num:"99°F", text:"hottest day in Central Park in 2025 — highest temperature since 2012" },

  { cat:"BOH", color:"#A8D8A8", emoji:"🗑️", num:"12,000", text:"tons of residential trash collected daily by the Department of Sanitation" },
  { cat:"BOH", color:"#A8D8A8", emoji:"🐀", num:"8,048", text:"rat mitigation inspections in just the first half of 2025" },
]

// Size tiers — very exaggerated
const SIZES = [
  { w: 420, numSize: 52, textSize: 16 },  // XL
  { w: 320, numSize: 38, textSize: 14 },  // L
  { w: 250, numSize: 30, textSize: 13 },  // M
  { w: 195, numSize: 23, textSize: 12 },  // S
  { w: 155, numSize: 18, textSize: 11 },  // XS
];

const layer = document.getElementById('explode-layer');
const explodeBtn = document.getElementById('explode-btn');
let exploded = false;
let dragCard = null, dragOffX = 0, dragOffY = 0;

function rand(a,b){ return a + Math.random()*(b-a); }

function explode() {
  exploded = true;
  explodeBtn.textContent = '✕ Collapse';
  explodeBtn.classList.add('on');
  layer.classList.add('on');
  layer.innerHTML = '';

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  // Assign sizes — distribute across all facts
  const sizePool = [];
  ALL_FACTS.forEach((_, i) => {
    // weighted: more M/S, fewer XL/XS
    const weights = [0.08, 0.18, 0.35, 0.27, 0.12];
    const r = Math.random();
    let acc = 0, si = 3;
    for (let j = 0; j < weights.length; j++) { acc += weights[j]; if (r < acc) { si = j; break; } }
    sizePool.push(SIZES[si]);
  });

  // Grid-based placement to fill screen evenly
  const cols = 5, rows = Math.ceil(ALL_FACTS.length / cols);
  const cellW = window.innerWidth / cols;
  const cellH = (window.innerHeight - 80) / rows;

  ALL_FACTS.forEach((fact, i) => {
    const sz = sizePool[i];
    const rot = rand(-12, 12);

    // Place in grid cell with small random offset
    const col = i % cols;
    const row = Math.floor(i / cols);
    const tx = col * cellW + rand(8, cellW - sz.w - 8);
    const ty = 80 + row * cellH + rand(4, Math.max(8, cellH - 160));

    // Origin offset (from center, for animation)
    const ox = (tx + sz.w/2 - cx);
    const oy = (ty + 80 - cy);

    const card = document.createElement('div');
    card.className = 'fact-card animating';
    card.style.cssText = `
      left: ${tx}px; top: ${ty}px;
      width: ${sz.w}px;
      --rot: ${rot}deg;
      --ox: ${-ox}px;
      --oy: ${-oy}px;
      transform: rotate(${rot}deg);
      animation-delay: ${rand(0, 0.25)}s;
      z-index: ${Math.floor(rand(1, 30))};
    `;

    card.innerHTML = `
      <div class="fc-bar" style="background:${fact.color}"></div>
      <div class="fc-cat" style="color:${fact.color}">${fact.cat}</div>
      <div class="fc-num" style="font-size:${sz.numSize}px">${fact.num}</div>
      <div class="fc-text" style="font-size:${sz.textSize}px">${fact.text}</div>
      <div class="fc-emoji" style="--edelay:${rand(0,2)}s; --erot:${rand(-12,0)}deg; --erot2:${rand(0,12)}deg">${fact.emoji}</div>
    `;

    // Drag
    card.addEventListener('mousedown', e => {
      dragCard = card;
      dragOffX = e.clientX - card.getBoundingClientRect().left;
      dragOffY = e.clientY - card.getBoundingClientRect().top;
      card.style.zIndex = 999;
      card.style.transition = 'box-shadow 0.2s ease';
      e.stopPropagation();
    });

    // remove animation class after done
    card.addEventListener('animationend', () => card.classList.remove('animating'));

    layer.appendChild(card);
  });
}

function collapse() {
  exploded = false;
  explodeBtn.textContent = '✦ Explode';
  explodeBtn.classList.remove('on');

  const cards = layer.querySelectorAll('.fact-card');
  cards.forEach((card, i) => {
    card.classList.add('animating-out');
    card.style.animationDelay = `${i * 0.015}s`;
  });
  setTimeout(() => {
    layer.classList.remove('on');
    layer.innerHTML = '';
  }, 500);
}

explodeBtn.addEventListener('click', () => {
  if (exploded) collapse(); else explode();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && exploded) collapse(); });

// Global drag handlers
window.addEventListener('mousemove', e => {
  if (!dragCard) return;
  dragCard.style.left = (e.clientX - dragOffX) + 'px';
  dragCard.style.top  = (e.clientY - dragOffY) + 'px';
});
window.addEventListener('mouseup', () => { dragCard = null; });
</script>
